<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Odaklan | Kurtuluş İstasyonu</title>
    <style>
        :root {
            --bg-color: #0d0e12;
            --card-bg: #161820;
            --accent-color: #ff4757;
            --text-color: #f1f2f6;
            --text-muted: #a4b0be;
            --success-color: #2ed573;
            --warning-color: #ffa500;
        }

        body {
            font-family: '-apple-system', BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            box-sizing: border-box;
        }

        .container {
            width: 100%;
            max-width: 600px;
            text-align: center;
        }

        h1 {
            font-size: 2.5rem;
            margin-bottom: 5px;
            letter-spacing: -1px;
        }

        .subtitle {
            color: var(--text-muted);
            margin-bottom: 30px;
            font-size: 1.1rem;
        }

        .card {
            background-color: var(--card-bg);
            border-radius: 16px;
            padding: 30px;
            margin-bottom: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            border: 1px solid #232736;
        }

        .target-box {
            border-left: 4px solid var(--accent-color);
            text-align: left;
            padding-left: 15px;
        }

        .target-title {
            font-size: 0.9rem;
            color: var(--accent-color);
            text-transform: uppercase;
            font-weight: bold;
            letter-spacing: 1px;
        }

        .target-text {
            font-size: 1.2rem;
            font-weight: 600;
            margin: 5px 0 0 0;
            line-height: 1.4;
        }

        .quote-box {
            min-height: 140px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-size: 1.2rem;
            font-style: italic;
            font-weight: 500;
            line-height: 1.5;
            color: #fff;
            transition: opacity 0.15s ease-in-out;
        }

        .author {
            margin-top: 10px;
            font-size: 0.9rem;
            color: var(--warning-color);
            font-weight: bold;
            font-style: normal;
        }

        button {
            background-color: var(--accent-color);
            color: white;
            border: none;
            padding: 15px 30px;
            font-size: 1.1rem;
            font-weight: bold;
            border-radius: 8px;
            cursor: pointer;
            transition
<body>

    <div class="container">
        
        <div class="badge">Sistem Aktif: <span id="currentDay" class="day-badge">...</span></div>
        <h1>SİLKELE KENDİNİ!</h1>
        <p class="subtitle">O telefon seni yönetemez, sen onu yönetirsin.</p>

        <div class="card target-box">
            <div id="dayTitle" class="target-title">GÜNLÜK DURUM</div>
            <p id="dayMessage" class="target-text">Sistem yükleniyor...</p>
        </div>

        <div class="card">
            <div id="quoteContainer" class="quote-box">
                <span id="quoteText">"Başarı, kimse izlemiyorken verdiğin emektir."</span>
                <span id="quoteAuthor" class="author">Sisteme Hoş Geldin</span>
            </div>
            <button onclick="changeQuote()">Elin Telefondan Çekilmiyorsa Bas (İRADENİ TEST ET)</button>
        </div>

        <div class="card">
            <div class="target-title" style="color: var(--success-color); text-align: center;">BUGÜNKÜ TOPLAM ÇALIŞMA SÜREN</div>
            <div id="timer" class="timer-display">00:00:00</div>
            <div class="timer-subtitle">Bu süre her gece 00:00'da otomatik sıfırlanır ve rapora kaydedilir.</div>
            <button id="startBtn" class="timer-btn" onclick="toggleTimer()">Masa Başındayım, Süreyi Başlat</button>
        </div>

        <div class="card">
            <div class="target-title" style="color: var(--warning-color); text-align: center; margin-bottom: 10px;">BU HAFTAKİ RAPORUN</div>
            <table class="history-table">
                <thead>
                    <tr>
                        <th>Gün</th>
                        <th style="text-align: right;">Çalışma Süresi</th>
                    </tr>
                </thead>
                <tbody id="historyBody">
                    <tr id="day-1"><td>Pazartesi</td><td style="text-align: right;" class="time-val">00:00:00</td></tr>
                    <tr id="day-2"><td>Salı</td><td style="text-align: right;" class="time-val">00:00:00</td></tr>
                    <tr id="day-3"><td>Çarşamba</td><td style="text-align: right;" class="time-val">00:00:00</td></tr>
                    <tr id="day-4"><td>Perşembe</td><td style="text-align: right;" class="time-val">00:00:00</td></tr>
                    <tr id="day-5"><td>Cuma</td><td style="text-align: right;" class="time-val">00:00:00</td></tr>
                    <tr id="day-6"><td>Cumartesi</td><td style="text-align: right;" class="time-val">00:00:00</td></tr>
                    <tr id="day-0"><td>Pazar</td><td style="text-align: right;" class="time-val">00:00:00</td></tr>
                </tbody>
            </table>
        </div>

    </div>

    <script>
        // Genişletilmiş Türkçe & İngilizce Havuz
        const masterQuotes = [
            { text: "Her gün %1 daha iyi olmak, yıl sonunda seni 37 kat daha iyi yapar.", author: "- James Clear" },
            { text: "Motivasyon geçicidir, sistemler ve alışkanlıklar kalıcıdır. Sistemine sadık kal.", author: "- James Clear" },
            { text: "Dinlenmek yok. Kazanana kadar çalışmak var. Ben sadece kazanmayı bilirim.", author: "- Kobe Bryant" },
            { text: "Şampiyonluklar antrenman salonlarında, kimse izlemiyorken kazanılır.", author: "- Kobe Bryant" },
            { text: "Sıradan insanların olağanüstü olmayı seçebileceğine inanıyorum.", author: "- Elon Musk" },
            { text: "Eğer bir şeyler senin için gerçekten önemliyse, oranlar aleyhinde olsa bile onu yaparsın.", author: "- Elon Musk" },
            { text: "Yaptığın işin hakkını ver. Sadece çalışmış olmak için çalışma, derin çalış (Deep Work).", author: "- Cal Newport" },
            { text: "Odaklanma, 'evet' demek değildir. Diğer yüzlerce iyi fikre 'hayır' diyebilmektir.", author: "- Steve Jobs" },
            { text: "Disiplin, ne istediğin ile şu an ne istediğin arasında yaptığın seçimdir.", author: "- Abraham Lincoln" },
            { text: "Yarın yaparım diyenlerin mezarlığı, gerçekleşmemiş hayallerle doludur.", author: "- Marcus Aurelius" },
            { text: "I've missed more than 9000 shots in my career. I've failed over and over again in my life. And that is why I succeed.", author: "- Michael Jordan" },
            { text: "Some people want it to happen, some wish it would happen, others make it happen.", author: "- Michael Jordan" },
            { text: "Discipline is doing what you hate to do, but all the same doing it like you love it.", author: "- Mike Tyson" },
            { text: "When you're tired, mind says it's over, but it's not. You still have 40% left.", author: "- David Goggins" },
            { text: "Don't stop when you're tired. Stop when you're done.", author: "- David Goggins" },
            { text: "Obsession will beat talent every time. You got to be obsessed.", author: "- Kobe Bryant" },
            { text: "Great things come from hard work and perseverance. No excuses.", author: "- Kobe Bryant" },
            { text: "The only way to do great work is to love what you do.", author: "- Steve Jobs" }
        ];

        const daySystems = {
            0: { name: "Pazar", msg: "Haftanın son günü! Eksiklerini kapatmak ve yeni haftaya güçlü girmek için son viraj. Bırakma!" },
            1: { name: "Pazartesi", msg: "Haftanın ilk günü! Nasıl başlarsan öyle gider. Sosyal medyayı ilk günden ele ve disiplini kur!" },
            2: { name: "Salı", msg: "Hafta ivme kazandı. Dünkü emeğinin üzerine koyma vakti. Telefonu kapat, tempoyu koru." },
            3: { name: "Çarşamba", msg: "Haftanın tam ortasındasın! Kırılma noktası burası. Yorgunluğa yenilme, masaya geç." },
            4: { name: "Perşembe", msg: "Hafta sonuna az kaldı diye gevşemek yok. Gerçek kazananlar herkes yorulmuşken basanlardır." },
            5: { name: "Cuma", msg: "Haftanın son düzlüğü! Bu günü de tam odakla bitir ki hafta sonuna vicdanın rahat gir." },
            6: { name: "Cumartesi", msg: "Cumartesi disiplini! Herkes yatarken veya gezerken senin odaklanman seni zirveye taşıyacak." }
        };

        let totalSeconds = 0;
        let timerId = null;
        let isRunning = false;
        
        // Dinamik karıştırılmış söz torbası
        let shuffledQuotes = [];

        window.onload = function() {
            const currentDayNumber = new Date().getDay();
            const dayData = daySystems[currentDayNumber];
            
            document.getElementById('currentDay').innerText = dayData.name;
            document.getElementById('dayTitle').innerText = `${dayData.name} Meydan Okuması`;
            document.getElementById('dayMessage').innerText = dayData.msg;
            
            const activeRow = document.getElementById(`day-${currentDayNumber}`);
            if(activeRow) activeRow.classList.add('active-day-row');
            
            // Söz mekanizmasını tetikle
            changeQuote();   
            checkDailyReset(); 
            updateTimerDisplay();
            updateHistoryTable();
        };

        // Fisher-Yates Algoritmasıyla Havuzu Çalkalayan Fonksiyon
        function refreshAndShufflePool() {
            shuffledQuotes = [...masterQuotes];
            for (let i = shuffledQuotes.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [shuffledQuotes[i], shuffledQuotes[j]] = [shuffledQuotes[j], shuffledQuotes[i]];
            }
        }

        // KESİNLİKLE EŞSİZ SIRA TABANLI SÖZ SEÇİMİ
        function changeQuote() {
            const container = document.getElementById('quoteContainer');
            const quoteText = document.getElementById('quoteText');
            const quoteAuthor = document.getElementById('quoteAuthor');
            
            // Eğer torba boşaldıysa ya da ilk kez çalışıyorsa yeniden doldur ve çalkala
            if (shuffledQuotes.length === 0) {
                refreshAndShufflePool();
            }
            
            // Torbanın en sonundaki sözü çek al (Böylece sıradaki tamamen benzersiz olur)
            const selectedQuote = shuffledQuotes.pop();
            
            container.style.opacity = 0;
            setTimeout(() => {
                quoteText.innerText = `"${selectedQuote.text}"`;
                quoteAuthor.innerText = selectedQuote.author;
                container.style.opacity = 1;
            }, 150);
        }

        function formatSeconds(secs) {
            const h = Math.floor(secs / 3600).toString().padStart(2, '0');
            const m = Math.floor((secs % 3600) / 60).toString().padStart(2, '0');
            const s = (secs % 60).toString().padStart(2, '0');
            return `${h}:${m}:${s}`;
        }

        function checkDailyReset() {
            const todayDateString = new Date().toLocaleDateString('tr-TR');
            const savedDate = localStorage.getItem('studyDate');
            const currentDayNumber = new Date().getDay();
            
            if (savedDate !== todayDateString) {
                if (savedDate) {
                    const yesterdayDayNumber = (currentDayNumber === 0) ? 6 : currentDayNumber - 1;
                    const currentActiveSeconds = parseInt(localStorage.getItem('totalStudySeconds')) || 0;
                    localStorage.setItem(`history-day-${yesterdayDayNumber}`, currentActiveSeconds);
                }
                
                localStorage.setItem('studyDate', todayDateString);
                localStorage.setItem('totalStudySeconds', 0);
                totalSeconds = 0;
            } else {
                totalSeconds = parseInt(localStorage.getItem('totalStudySeconds')) || 0;
            }
            localStorage.setItem(`history-day-${currentDayNumber}`, totalSeconds);
        }

        function updateTimerDisplay() {
            document.getElementById('timer').innerText = formatSeconds(totalSeconds);
            const currentDayNumber = new Date().getDay();
            const activeRowTime = document.querySelector(`#day-${currentDayNumber} .time-val`);
            if(activeRowTime) activeRowTime.innerText = formatSeconds(totalSeconds);
        }

        function updateHistoryTable() {
            for (let i = 0; i <= 6; i++) {
                const savedDaySecs = parseInt(localStorage.getItem(`history-day-${i}`)) || 0;
                const rowTime = document.querySelector(`#day-${i} .time-val`);
                if(rowTime) rowTime.innerText = formatSeconds(savedDaySecs);
            }
        }

        function toggleTimer() {
            const startBtn = document.getElementById('startBtn');
            const currentDayNumber = new Date().getDay();
            
            if (!isRunning) {
                checkDailyReset(); 
                isRunning = true;
                startBtn.innerText = "Mola Ver / Sayacı Durdur";
                startBtn.style.backgroundColor = "#ff4757"; 
                
                timerId = setInterval(() => {
                    totalSeconds++;
                    localStorage.setItem('totalStudySeconds', totalSeconds); 
                    localStorage.setItem(`history-day-${currentDayNumber}`, totalSeconds);
                    updateTimerDisplay();
                }, 1000);
            } else {
                isRunning = false;
                clearInterval(timerId);
                startBtn.innerText = "Çalışmaya Devam Et";
                startBtn.style.backgroundColor = "#2ed573"; 
            }
        }
    </script>
</body>
</html>
